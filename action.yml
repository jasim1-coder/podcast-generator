name: "Podcast Generator"
author: "Muhammed Jasim"
description: "Generate a feed for a podcast from YAML file"
runs:
  using: "docker"
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: The commiters email address
    required: True
    default: ${{ github.actor }}@localhost
  name:
    description: The commiters name
    required: True
    default: ${{ github.actor}}
